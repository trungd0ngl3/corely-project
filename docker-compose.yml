version: '3.8'

# Định nghĩa mạng nội bộ
networks:
  corely_network:
    driver: bridge

# Khởi tạo Volume để lưu trữ dữ liệu vĩnh viễn (tránh mất data khi tắt container)
volumes:
  corely-pg-data:
  corely-redis-data:

services:
  # 1. Database: PostgreSQL tích hợp pgvector
  postgres:
    image: pgvector/pgvector:pg15
    container_name: corely-postgres
    restart: unless-stopped
    env_file:
      - .env # Đọc từ corely-project/.env
    ports:
      - "5432:5432"
    volumes:
      - corely-pg-data:/var/lib/postgresql/data
    networks:
      - corely_network

  # 2. Cache: Redis
  redis:
    image: redis:alpine
    container_name: corely-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - corely-redis-data:/data
    networks:
      - corely_network

