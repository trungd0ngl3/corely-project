spring:
  application:
    name: backend

  # 1. Cấu hình Database (PostgreSQL)
  datasource:
    # Nếu có biến DB_HOST truyền vào thì dùng, không thì mặc định là localhost
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:corely_db}
    username: ${DB_USER:corely_admin}
    password: ${DB_PASSWORD:supersecretpassword}
    driver-class-name: org.postgresql.Driver

  # 2. Cấu hình JPA / Hibernate
  jpa:
    hibernate:
      # update: Tự động cập nhật bảng nếu Entity thay đổi (Chỉ dùng cho môi trường Dev)
      # Khi lên Production, hãy đổi thành 'validate' và dùng Flyway/Liquibase
      ddl-auto: update
    show-sql: true # In câu lệnh SQL ra console để dễ debug
    properties:
      hibernate:
        format_sql: true # Format SQL cho dễ đọc
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 3. Cấu hình Cache & Giỏ hàng (Redis)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # password: ${REDIS_PASSWORD:} # Bỏ comment nếu Redis của bạn có cài password

# Cấu hình log level để theo dõi ứng dụng
logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG # Xem chi tiết câu SQL
    org.hibernate.orm.jdbc.bind: TRACE # Xem các tham số (parameters) truyền vào câu SQL