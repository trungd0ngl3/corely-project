spring:
  application:
    name: backend

  # 1. Cấu hình Database (PostgreSQL)
  datasource:
    # Nếu có biến DB_HOST thì dùng, mặc định là localhost
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:corely_db}
    username: ${DB_USER:corely_admin}
    password: ${DB_PASSWORD:supersecretpassword}
    driver-class-name: org.postgresql.Driver

  # 2. Cấu hình JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 3. Cấu hình Cache & Giỏ hàng (Redis)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}


jwt:
  signer-key: "4XGd^ZFYu$#w=%O(&GXJk#TjeavPg?vb^y8.%SDTkI("
  valid-duration: 3600 #sec
  refreshable-duration: 360000 #sec


# Cấu hình log level để theo dõi ứng dụng
logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG # Xem chi tiết câu SQL
    org.hibernate.orm.jdbc.bind: TRACE # Xem các tham số (parameters) truyền vào câu SQL